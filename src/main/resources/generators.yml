default-generator:
  id: END_STONE
  name: "&e&lStone Generator!"
  # Description of the item (Lore)
  lore:
    - "&7Place this block on the ground"
    - "&7to start generating stone."
  # Generation mode:
  # 'above'   - Spawns generated blocks one block above the generator.
  # 'replace' - Spawns generated blocks exactly at the generator's location.
  type: above
  # Cooldown in ticks (20 ticks = 1 second)
  cooldown: 40
  # List of blocks generated by this generator.
  # Format: "MATERIAL_ID:CHANCE"
  # The total sum of chances should ideally be 100.0
  blocks:
    - "STONE:90.0"
    - "COBBLESTONE:10.0"
  recipe:
    shape:
      - "SSS"
      - "SRS"
      - "SSS"
    ingredients:
      - "S:STONE"
      - "R:REDSTONE"
  upgrade:
    gen: stoniarka-poziom2
    cost:
      - "money:1000"
      - "item:DIAMOND:5"

stoniarka-poziom2:
  id: OBSIDIAN
  name: "&e&lStone Generator! &7[&cLevel 2&7]"
  lore:
    - "&7Upgraded generator."
    - "&7Generates ores much faster!"
  type: above
  cooldown: 20 # Faster!
  blocks: # More!
    - "STONE:50.0"
    - "COAL_ORE:20.0"
    - "IRON_ORE:20.0"
    - "DIAMOND_ORE:10.0"